<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Lost the Scent | GrowwPaws</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="images/growwpark_logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== GLOBAL STYLES & VARIABLES ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* GrowwPaws Violet Theme */
        :root {
            --bg-color: #F8FAFC;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --accent-color: #A78BFA; 
            --accent-hover: #8B5CF6; 
            --card-bg: #FFFFFF;
            --border-color: #CBD5E1;
            --shape-color: rgba(167, 139, 250, 0.1); /* Faint Violet */
        }

        body.dark-mode {
            --bg-color: #0F172A;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --card-bg: #1E293B;
            --border-color: #334155;
            --shape-color: rgba(167, 139, 250, 0.15); /* Slightly brighter for dark mode */
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden !important; /* STRICT NO SCROLL LOCK */
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }

        /* RTL SUPPORT */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }

        /* ==================== ANIMATED BACKGROUND ==================== */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: var(--shape-color);
            animation: float 20s infinite ease-in-out;
            transition: background-color 0.3s;
        }

        /* Using structural shapes */
        .shape-1 { width: 350px; height: 350px; top: 5%; left: 5%; animation-delay: 0s; }
        .shape-2 { width: 200px; height: 200px; top: 60%; right: 10%; animation-delay: 5s; background: rgba(139, 92, 246, 0.08); }
        .shape-3 { width: 150px; height: 150px; bottom: 15%; left: 20%; animation-delay: 10s; }
        .shape-4 { width: 250px; height: 250px; top: 25%; right: 25%; animation-delay: 15s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px) scale(1); }
            33% { transform: translateY(-30px) translateX(30px) scale(1.05); }
            66% { transform: translateY(30px) translateX(-30px) scale(0.95); }
        }

        /* ==================== MAIN CONTAINER ==================== */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        /* ==================== 404 NUMBER (Branded) ==================== */
        .error-number {
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 900;
            color: var(--text-main);
            line-height: 0.9;
            margin-bottom: 0.5rem;
            letter-spacing: -5px;
            position: relative;
            animation: glitch 4s infinite;
        }
        
        /* Make the 0 Violet for branding */
        .error-number span { color: var(--accent-hover); }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); text-shadow: none; }
            92% { transform: translate(-4px, 3px); text-shadow: 3px 0 var(--accent-hover); }
            94% { transform: translate(3px, -3px); text-shadow: -3px 0 var(--text-main); }
            96% { transform: translate(-3px, -3px); }
            98% { transform: translate(3px, 3px); }
        }

        /* ==================== TEXT STYLES ==================== */
        .error-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 1rem;
            letter-spacing: -1px;
            animation: fadeInUp 0.8s ease-out;
        }

        .error-message {
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== ICONS (Bento Style) ==================== */
        .icon-container {
            display: flex;
            justify-content: center;
            gap: clamp(1rem, 3vw, 2rem);
            margin: 2rem 0;
            flex-wrap: wrap;
            animation: fadeInUp 1.1s ease-out;
        }

        .error-icon {
            width: clamp(60px, 15vw, 75px);
            height: clamp(60px, 15vw, 75px);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: var(--text-muted);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .error-icon:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: var(--accent-hover);
            color: var(--accent-hover);
            box-shadow: 0 15px 30px -10px rgba(167, 139, 250, 0.3);
        }

        /* ==================== BUTTONS ==================== */
        .btn-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
            animation: fadeInUp 1.2s ease-out;
        }

        .btn-solid {
            padding: 14px 32px;
            border-radius: 999px; /* Pill shaped to match GrowwPaws auth pages */
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            background: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }
        .btn-solid:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        body.dark-mode .btn-solid { color: #0F172A; font-weight: 900; }

        /* ==================== EMOJI FLOAT (Pet Themed) ==================== */
        .emoji-float {
            position: absolute;
            font-size: clamp(2rem, 5vw, 3.5rem);
            opacity: 0.15; /* Subtle */
            animation: emojiFloat 15s infinite ease-in-out;
            pointer-events: none;
            filter: grayscale(100%); /* Keeps it elegant in the background */
            transition: filter 0.3s;
        }
        
        /* Reveal color briefly on hover over container */
        .error-container:hover ~ .emoji-float { filter: grayscale(0%); opacity: 0.4; }

        .emoji-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .emoji-2 { top: 25%; right: 12%; animation-delay: 3s; }
        .emoji-3 { bottom: 15%; left: 15%; animation-delay: 6s; }
        .emoji-4 { bottom: 20%; right: 10%; animation-delay: 9s; }

        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        /* Theme Toggle specific to 404 */
        .theme-toggle-wrapper {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 50;
        }
        .theme-btn { 
            width: 44px; height: 44px; border-radius: 50%; 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            color: var(--text-main); display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s ease; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .theme-btn:hover { border-color: var(--accent-hover); color: var(--accent-hover); transform: rotate(15deg); }
        
        [dir="rtl"] .theme-toggle-wrapper { right: auto; left: 30px; }

    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
    </div>

    <div class="error-container">
        
        <div class="error-number">4<span>0</span>4</div>

        <h1 class="error-title">Lost the Scent?</h1>
        <p class="error-message">
            The page you're sniffing around for seems to have gone missing. 
            Don't worry, let's get you back to the pack.
        </p>

        <div class="icon-container">
            <div class="error-icon" title="Shop Food" onclick="window.location.href='shop.html'"><i class="fas fa-store"></i></div>
            <div class="error-icon" title="Nutrition Dashboard" onclick="window.location.href='user.html'"><i class="fas fa-columns"></i></div>
            <div class="error-icon" title="Meal Plan Quiz" onclick="window.location.href='quiz.html'"><i class="fas fa-bone"></i></div>
            <div class="error-icon" title="Contact Support" onclick="window.location.href='contact.html'"><i class="fas fa-envelope"></i></div>
        </div>

        <div class="btn-container">
            <a href="index.html" class="btn-solid">
                <i class="fas fa-arrow-left mr-2"></i> Back to Homepage
            </a>
        </div>
    </div>

    <div class="emoji-float emoji-1">🐾</div>
    <div class="emoji-float emoji-2">🦴</div>
    <div class="emoji-float emoji-3">🐶</div>
    <div class="emoji-float emoji-4">🥩</div>

    <div class="theme-toggle-wrapper">
        <button id="theme-btn" class="theme-btn" title="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <script>
        // --- THEME LOGIC (To respect the global user choice) ---
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = themeBtn.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        function applyTheme(isDark) {
            if(isDark) {
                document.body.classList.add('dark-mode');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                document.body.classList.remove('dark-mode');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // Initialize Theme on Load
        applyTheme(savedTheme === 'dark');

        themeBtn.addEventListener('click', () => {
            const isDark = !document.body.classList.contains('dark-mode');
            applyTheme(isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // --- RTL LOGIC (Inherit global) ---
        const savedDir = localStorage.getItem('dir') || 'ltr';
        if (savedDir === 'rtl') { document.documentElement.dir = 'rtl'; }

        // --- MOUSE PARALLAX EFFECT ---
        document.addEventListener('mousemove', (e) => {
            const shapes = document.querySelectorAll('.floating-shape');
            const emojis = document.querySelectorAll('.emoji-float');

            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;

            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 8;
                const x = (mouseX - 0.5) * speed;
                const y = (mouseY - 0.5) * speed;
                shape.style.transform = `translate(${x}px, ${y}px)`;
            });

            emojis.forEach((emoji, index) => {
                const speed = (index + 1) * 15; 
                const x = (mouseX - 0.5) * speed;
                const y = (mouseY - 0.5) * speed;
                emoji.style.transform = `translate(${x}px, ${y}px) rotate(${x * 2}deg)`;
            });
        });

        // --- ICON CLICK BOUNCE FEEDBACK ---
        const icons = document.querySelectorAll('.error-icon');
        icons.forEach(icon => {
            icon.addEventListener('mousedown', () => {
                icon.style.transform = "scale(0.9)";
            });
            icon.addEventListener('mouseup', () => {
                icon.style.transform = "scale(1.05)";
                setTimeout(() => icon.style.transform = "", 200);
            });
        });
    </script>

</body>
</html>
